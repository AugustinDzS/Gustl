<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Aerztebefragung GKE Eisenach</title>
<style>
:root{--navy:#003366;--navy2:#00509e;--bg:#f0f4f8;--white:#fff;--border:#d0dae6;--text:#1a2a3a;--muted:#5a6a7a;--accent:#e8f0fa;--err:#cc2200;--ok:#1a7a4a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",Arial,sans-serif;background:var(--bg);min-height:100vh;color:var(--text);}
.hdr{background:var(--white);border-bottom:3px solid var(--navy);padding:14px 32px;display:flex;align-items:center;gap:18px;box-shadow:0 2px 8px rgba(0,51,102,.08);position:sticky;top:0;z-index:100;}
.hdr img{height:48px;object-fit:contain;}
.hdr h1{font-size:15px;font-weight:700;color:var(--navy);}
.hdr p{font-size:12px;color:var(--muted);margin-top:2px;}
.pbwrap{background:var(--border);height:4px;}
.pb{height:4px;background:var(--navy);transition:width .4s;}
.wrap{max-width:720px;margin:36px auto 60px;padding:0 16px;}
.card{background:var(--white);border-radius:12px;box-shadow:0 4px 24px rgba(0,51,102,.09);overflow:hidden;}
.ch{background:var(--navy);padding:22px 32px 18px;}
.ch .pg{font-size:11px;font-weight:600;color:rgba(255,255,255,.55);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.ch h2{font-size:20px;font-weight:700;color:#fff;line-height:1.3;}
.cb{padding:28px 32px 32px;}
.intro{font-size:14px;line-height:1.75;white-space:pre-line;margin-bottom:28px;}
.qb{margin-bottom:26px;}
.ql{font-size:14px;font-weight:600;margin-bottom:11px;line-height:1.5;}
.req{color:var(--err);margin-left:3px;}
.likert{display:flex;gap:8px;flex-wrap:wrap;}
.likert input{display:none;}
.likert label{flex:1;min-width:90px;text-align:center;padding:10px 6px;border:2px solid var(--border);border-radius:8px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .18s;line-height:1.3;}
.likert label:hover{border-color:var(--navy2);color:var(--navy2);background:var(--accent);}
.likert input:checked+label{border-color:var(--navy);background:var(--navy);color:#fff;font-weight:600;}
textarea{width:100%;min-height:90px;padding:11px 13px;border:2px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;color:var(--text);resize:vertical;outline:none;transition:border-color .18s;}
textarea:focus{border-color:var(--navy);}
textarea::placeholder{color:#aab4be;}
.radio-group{display:flex;flex-direction:column;gap:10px;}
.radio-opt{display:flex;align-items:center;gap:10px;padding:11px 14px;border:2px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;transition:all .18s;}
.radio-opt:hover{border-color:var(--navy2);background:var(--accent);}
.radio-opt input{accent-color:var(--navy);width:16px;height:16px;flex-shrink:0;}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chips input{display:none;}
.chips label{padding:7px 14px;border:2px solid var(--border);border-radius:20px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .18s;}
.chips label:hover{border-color:var(--navy2);color:var(--navy2);}
.chips input:checked+label{border-color:var(--navy);background:var(--navy);color:#fff;font-weight:600;}
.ferr{display:none;font-size:12px;color:var(--err);margin-top:6px;font-weight:500;}
.ferr.on{display:block;}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:28px;padding-top:22px;border-top:1px solid var(--border);}
.btn{padding:11px 28px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;border:2px solid var(--navy);}
.btn-p{background:var(--navy);color:#fff;}
.btn-p:hover{background:var(--navy2);border-color:var(--navy2);}
.btn-s{background:transparent;color:var(--navy);}
.btn-s:hover{background:var(--accent);}
.ty{text-align:center;padding:52px 32px;}
.ty .ck{width:64px;height:64px;background:var(--ok);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;color:#fff;}
.ty h2{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:12px;}
.ty p{font-size:14px;color:var(--muted);max-width:440px;margin:auto;line-height:1.7;}
.spin-wrap{text-align:center;padding:60px 32px;}
.spin{display:inline-block;width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
@media(max-width:600px){.cb{padding:18px 16px 22px;}.ch{padding:16px 16px 14px;}.likert{flex-direction:column;}.likert label{min-width:unset;text-align:left;}}
</style>
</head>

      {v:"mvz",t:"\u0069\u006e\u0020\u0065\u0069\u006e\u0065\u006d\u0020\u004d\u0056\u005a\u0020\u0064\u0065\u0072\u0020\u0045\u0069\u0073\u0065\u006e\u0061\u0063\u0068\u0020\u0047\u006d\u0062\u0048"},
      {v:"beide",t:"\u0069\u006d\u0020\u004b\u006c\u0069\u006e\u0069\u006b\u0075\u006d\u0020\u0053\u0074\u002e\u0020\u0047\u0065\u006f\u0072\u0067\u0020\u0055\u004e\u0044\u0020\u0069\u006e\u0020\u0065\u0069\u006e\u0065\u006d\u0020\u004d\u0056\u005a\u0020\u0064\u0065\u0072\u0020\u0045\u0069\u0073\u0065\u006e\u0061\u0063\u0068\u0020\u0047\u006d\u0062\u0048"}
    ];
    var radioHtml="";
    for(var i=0;i<awOpts.length;i++){
      radioHtml+='<label class="radio-opt"><input type="radio" name="aw" value="'+awOpts[i].v+'" onchange="clearErr(\'err_aw\')"> '+awOpts[i].t+'</label>';
    }
    var fbHtml="";
    for(var i=0;i<FB.length;i++){
      fbHtml+='<input type="checkbox" id="fb'+i+'" name="fb" value="'+FB[i]+'"><label for="fb'+i+'">'+FB[i]+'</label>';
    }
    var intro="\u0056\u0069\u0065\u006c\u0065\u006e\u0020\u0044\u0061\u006e\u006b\u002c\u0020\u0064\u0061\u0073\u0073\u0020\u0053\u0069\u0065\u0020\u0073\u0069\u0063\u0068\u0020\u005a\u0065\u0069\u0074\u0020\u0066\u00fc\u0072\u0020\u0064\u0069\u0065\u0073\u0065\u0020\u0042\u0065\u0066\u0072\u0061\u0067\u0075\u006e\u0067\u0020\u006e\u0065\u0068\u006d\u0065\u006e\u002e\n\nZiel des Projekts ist es, die Grundlage f\u00fcr eine engere Verzahnung der ambulanten Leistungserbringung im MVZ Eisenach mit der station\u00e4ren Leistungserbringung im St. Georg Klinikum Eisenach zu schaffen. Dabei stehen insbesondere die Patientensteuerung, die Zusammenarbeit zwischen MVZ und Klinikum sowie die ambulant-station\u00e4re Vernetzung im Fokus.\n\nUm konkrete Verbesserungspotenziale identifizieren zu k\u00f6nnen, m\u00f6chten wir Ihre Erfahrungen, Einsch\u00e4tzungen und Perspektiven als \u00e4rztlicher Leistungserbringer einbeziehen.\n\nDie Befragung ist anonym. Die Ergebnisse werden ausschlie\u00dflich in aggregierter Form ausgewertet. Die Bearbeitung dauert etwa 5\u20137 Minuten.";
    c.innerHTML='<div class="ch"><div class="pg">Seite 1 von '+(TOTAL-1)+'</div><h2>Zu Ihrer Person</h2></div>'+
      '<div class="cb">'+
      '<div class="intro">'+intro+'</div>'+
      '<div class="qb"><div class="ql">Ich bin als Arzt/\u00c4rztin t\u00e4tig\u2026<span class="req">*</span></div><div class="radio-group">'+radioHtml+'</div><div class="ferr" id="err_aw">Bitte w\u00e4hlen Sie eine Option.</div></div>'+
      '<div class="qb"><div class="ql">Mein Fachbereich (Mehrfachauswahl m\u00f6glich)<span class="req">*</span></div><div class="chips">'+fbHtml+'</div><div class="ferr" id="err_fb">Bitte w\u00e4hlen Sie mindestens einen Fachbereich.</div></div>'+
      navHtml(false,false)+'</div>';
    if(ans.aw){var r=c.querySelector('input[value="'+ans.aw+'"]');if(r)r.checked=true;}
    if(ans.fb){ans.fb.forEach(function(f){var i=FB.indexOf(f);if(i>=0){var cb=c.querySelector('#fb'+i);if(cb)cb.checked=true;}});}
  } else if(page>=1&&page<=3){
    var th=PATHS[ans.aw][page-1];
    var isLast=page===3;
    var qhtml="";
    for(var i=0;i<th.qs.length;i++){qhtml+=likertHtml(th.qs[i]);}
    qhtml+=openHtml(th.oid,th.olab);
    c.innerHTML='<div class="ch"><div class="pg">Seite '+(page+1)+' von '+(TOTAL-1)+'</div><h2>'+th.theme+'</h2></div>'+
      '<div class="cb">'+qhtml+navHtml(true,isLast)+'</div>';
    for(var i=0;i<th.qs.length;i++){
      var q=th.qs[i];
      if(ans[q.id]){var r=c.querySelector('input[name="'+q.id+'"][value="'+ans[q.id]+'"]');if(r)r.checked=true;}
    }
    if(ans[th.oid]){var ta=c.querySelector('#'+th.oid);if(ta)ta.value=ans[th.oid];}
  } else {
    c.innerHTML='<div class="ty"><div class="ck">&#10003;</div><h2>Vielen Dank f\u00fcr Ihre Teilnahme!</h2><p>Ihre R\u00fcckmeldungen flie\u00dfen direkt in die Weiterentwicklung der Zusammenarbeit zwischen dem St. Georg Klinikum Eisenach und den MVZ der Eisenach GmbH ein.</p></div>';
  }
  window.scrollTo({top:0,behavior:"smooth"});
}

function clearErr(id){var e=document.getElementById(id);if(e)e.classList.remove("on");}

function valIntro(){
  var ok=true;
  var r=document.querySelector('input[name="aw"]:checked');
  if(!r){document.getElementById("err_aw").classList.add("on");ok=false;}
  else{document.getElementById("err_aw").classList.remove("on");ans.aw=r.value;}
  var fbs=[];
  var checked=document.querySelectorAll('input[name="fb"]:checked');
  for(var i=0;i<checked.length;i++){fbs.push(checked[i].value);}
  if(!fbs.length){document.getElementById("err_fb").classList.add("on");ok=false;}
  else{document.getElementById("err_fb").classList.remove("on");ans.fb=fbs;}
  return ok;
}

function valTheme(ti){
  var ok=true;
  var th=PATHS[ans.aw][ti];
  for(var i=0;i<th.qs.length;i++){
    var q=th.qs[i];
    var r=document.querySelector('input[name="'+q.id+'"]:checked');
    if(!r){document.getElementById("err_"+q.id).classList.add("on");ok=false;}
    else{document.getElementById("err_"+q.id).classList.remove("on");ans[q.id]=r.value;}
  }
  var ta=document.getElementById(th.oid);
  if(!ta||!ta.value.trim()){document.getElementById("err_"+th.oid).classList.add("on");ok=false;}
  else{document.getElementById("err_"+th.oid).classList.remove("on");ans[th.oid]=ta.value.trim();}
  return ok;
}

function nextPage(){
  if(page===0){if(!valIntro())return;page=1;renderPage();}
  else if(page<3){if(!valTheme(page-1))return;page++;renderPage();}
  else if(page===3){if(!valTheme(2))return;submit();}
}

function prevPage(){if(page>0){page--;renderPage();}}

function submit(){
  var c=document.getElementById("card");
  c.innerHTML='<div class="spin-wrap"><div class="spin"></div><p style="margin-top:14px;color:var(--muted);font-size:14px;">Antworten werden \u00fcbermittelt\u2026</p></div>';
  var payload={};
  var keys=Object.keys(ans);
  for(var i=0;i<keys.length;i++){payload[keys[i]]=ans[keys[i]];}
  payload.fachbereich=ans.fb?ans.fb.join(", "):"";
  delete payload.fb;
  payload.timestamp=new Date().toISOString();
  fetch(WH,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload),mode:"no-cors"})
    .then(function(){page=4;renderPage();})
    .catch(function(){page=4;renderPage();});
}

renderPage();
</script>
