<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Aerztebefragung GKE Eisenach</title>
<style>
:root{--navy:#003366;--navy2:#00509e;--bg:#ffffff;--white:#ffffff;--border:#d0dae6;--text:#1a2a3a;--muted:#5a6a7a;--accent:#e8f0fa;--err:#cc2200;--ok:#1a7a4a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",Arial,sans-serif;background:var(--bg);min-height:100vh;color:var(--text);}
.hdr{background:#ffffff;border-bottom:3px solid var(--navy);padding:18px 36px;display:flex;align-items:center;gap:20px;box-shadow:0 2px 8px rgba(0,51,102,.08);position:sticky;top:0;z-index:100;}
.hdr img{height:56px;object-fit:contain;background:#ffffff;}
.hdr h1{font-size:17px;font-weight:700;color:var(--navy);}
.hdr p{font-size:12px;color:var(--muted);margin-top:3px;}
.pbwrap{background:var(--border);height:4px;}
.pb{height:4px;background:var(--navy);transition:width .4s;}
.wrap{max-width:720px;margin:36px auto 60px;padding:0 16px;}
.card{background:var(--white);border-radius:12px;box-shadow:0 4px 24px rgba(0,51,102,.09);overflow:hidden;}
.ch{background:var(--navy);padding:22px 32px 18px;}
.ch .pg{font-size:11px;font-weight:600;color:rgba(255,255,255,.55);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.ch h2{font-size:20px;font-weight:700;color:#fff;line-height:1.3;}
.cb{padding:28px 32px 32px;}
.intro-bold{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px;line-height:1.5;}
.intro-body{font-size:14px;line-height:1.75;color:var(--text);margin-bottom:14px;}
.intro-bullets{font-size:14px;line-height:1.75;color:var(--text);margin-bottom:14px;padding-left:20px;}
.intro-bullets li{margin-bottom:4px;}
.intro-cta{font-size:14px;color:var(--text);margin-bottom:28px;}
.qb{margin-bottom:26px;}
.ql{font-size:14px;font-weight:600;margin-bottom:11px;line-height:1.5;}
.req{color:var(--err);margin-left:3px;}
.likert{display:flex;gap:8px;flex-wrap:wrap;}
.likert input{display:none;}
.likert label{flex:1;min-width:90px;text-align:center;padding:10px 6px;border:2px solid var(--border);border-radius:8px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .18s;line-height:1.3;}
.likert label:hover{border-color:var(--navy2);color:var(--navy2);background:var(--accent);}
.likert input:checked+label{border-color:var(--navy);background:var(--navy);color:#fff;font-weight:600;}
.nw-label{border-color:#aaa !important;color:#777 !important;}
.nw-label:hover{border-color:#888 !important;color:#555 !important;background:#f5f5f5 !important;}
.likert input:checked+.nw-label{border-color:#888 !important;background:#888 !important;color:#fff !important;}
textarea{width:100%;padding:11px 13px;border:2px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;color:var(--text);resize:vertical;outline:none;transition:border-color .18s;}
textarea:focus{border-color:var(--navy);}
textarea::placeholder{color:#aab4be;}
.charcount{font-size:12px;color:var(--muted);text-align:right;margin-top:4px;}
.charcount.near{color:#cc7700;}
.charcount.full{color:var(--err);}
.radio-group{display:flex;flex-direction:column;gap:10px;}
.radio-opt{display:flex;align-items:center;gap:10px;padding:11px 14px;border:2px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;transition:all .18s;}
.radio-opt:hover{border-color:var(--navy2);background:var(--accent);}
.radio-opt input{accent-color:var(--navy);width:16px;height:16px;flex-shrink:0;}
.fb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.fb-grid input{display:none;}
.fb-grid label{padding:9px 14px;border:2px solid var(--border);border-radius:8px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .18s;display:block;}
.fb-grid label:hover{border-color:var(--navy2);color:var(--navy2);}
.fb-grid input:checked+label{border-color:var(--navy);background:var(--navy);color:#fff;font-weight:600;}
.ferr{display:none;font-size:12px;color:var(--err);margin-top:6px;font-weight:500;}
.ferr.on{display:block;}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:28px;padding-top:22px;border-top:1px solid var(--border);}
.btn{padding:11px 28px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;border:2px solid var(--navy);}
.btn-p{background:var(--navy);color:#fff;}
.btn-p:hover{background:var(--navy2);border-color:var(--navy2);}
.btn-s{background:transparent;color:var(--navy);}
.btn-s:hover{background:var(--accent);}
.ty{text-align:center;padding:52px 32px;}
.ty .ck{width:64px;height:64px;background:var(--ok);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;color:#fff;}
.ty h2{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:12px;}
.ty p{font-size:14px;color:var(--muted);max-width:440px;margin:auto;line-height:1.7;}
.spin-wrap{text-align:center;padding:60px 32px;}
.spin{display:inline-block;width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
@media(max-width:600px){.cb{padding:18px 16px 22px;}.ch{padding:16px 16px 14px;}.likert{flex-direction:column;}.likert label{min-width:unset;text-align:left;}.fb-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>

      {v:"klinikum",t:"im Klinikum St. Georg Eisenach"},
      {v:"mvz",t:"in einem MVZ der Eisenach GmbH"},
      {v:"beide",t:"im Klinikum St. Georg <strong>UND<\/strong> in einem MVZ der Eisenach GmbH"}
    ];
    var radioHtml="";
    for(var i=0;i<awOpts.length;i++){
      radioHtml+='<label class="radio-opt"><input type="radio" name="aw" value="'+awOpts[i].v+'" onchange="clearErr(\'err_aw\')"> '+awOpts[i].t+'</label>';
    }
    var fbHtml="";
    for(var i=0;i<FB.length;i++){
      fbHtml+='<input type="checkbox" id="fb'+i+'" name="fb" value="'+FB[i]+'" onchange="clearErr(\'err_fb\')"><label for="fb'+i+'">'+FB[i]+'</label>';
    }
    c.innerHTML='<div class="ch"><div class="pg">Seite 1 von '+(TOTAL-1)+'</div><h2>Herzlich Willkommen &amp; pers\u00f6nliche Angaben</h2></div>'+
      '<div class="cb">'+
      '<p class="intro-bold">Herzlich willkommen und vielen Dank, dass Sie sich Zeit f\u00fcr diese Befragung nehmen!</p>'+
      '<p class="intro-body">Mit dieser Umfrage m\u00f6chten wir die Zusammenarbeit und die Patientensteuerung zwischen dem MVZ Eisenach und dem St. Georg Klinikum Eisenach weiter verbessern. Als \u00e4rztliche Leistungserbringer kennen Sie die t\u00e4glichen Abl\u00e4ufe am besten \u2013 Ihre Erfahrungen und Perspektiven sind f\u00fcr uns daher von unsch\u00e4tzbarem Wert.</p>'+
      '<p class="intro-body">Das Wichtigste auf einen Blick:</p>'+
      '<ul class="intro-bullets"><li><strong>Ziel:</strong> Optimierung der ambulant-station\u00e4ren Vernetzung und der internen Zusammenarbeit.</li><li><strong>Dauer:</strong> ca. 5\u20137 Minuten.</li><li><strong>Anonymit\u00e4t:</strong> Ihre Teilnahme ist absolut anonym. Die Daten werden ausschlie\u00dflich aggregiert ausgewertet.</li></ul>'+
      '<p class="intro-cta">Klicken Sie unten auf \u201eWeiter\u201c, um zu starten.</p>'+
      '<div class="qb"><div class="ql">Ich bin als Arzt/\u00c4rztin t\u00e4tig\u2026<span class="req">*</span></div><div class="radio-group">'+radioHtml+'</div><div class="ferr" id="err_aw">Bitte w\u00e4hlen Sie eine Option.</div></div>'+
      '<div class="qb"><div class="ql">Mein Fachbereich<span class="req">*</span></div><div class="fb-grid">'+fbHtml+'</div><div class="ferr" id="err_fb">Bitte w\u00e4hlen Sie Ihren Fachbereich.</div></div>'+
      navHtml(false,false)+'</div>';
    if(ans.aw){var r=c.querySelector('input[name="aw"][value="'+ans.aw+'"]');if(r)r.checked=true;}
    if(ans.fb){var fbVals=ans.fb.split(", ");fbVals.forEach(function(v){var r=c.querySelector('input[name="fb"][value="'+v+'"]');if(r)r.checked=true;});}

  } else if(page>=1&&page<=3){
    var th=PATHS[ans.aw][page-1];
    var qhtml="";
    for(var i=0;i<th.qs.length;i++){qhtml+=likertHtml(th.qs[i]);}
    qhtml+=openHtml(th.oid,th.olab);
    c.innerHTML='<div class="ch"><div class="pg">Seite '+(page+1)+' von '+(TOTAL-1)+'</div><h2>'+th.theme+'</h2></div>'+
      '<div class="cb">'+qhtml+navHtml(true,false)+'</div>';
    for(var i=0;i<th.qs.length;i++){
      var q=th.qs[i];
      if(ans[q.id]){var r=c.querySelector('input[name="'+q.id+'"][value="'+ans[q.id]+'"]');if(r)r.checked=true;}
    }
    if(ans[th.oid]){var ta=c.querySelector('#'+th.oid);if(ta)ta.value=ans[th.oid];}

  } else if(page===4){
    c.innerHTML='<div class="ch"><div class="pg">Seite 5 von '+(TOTAL-1)+'</div><h2>Sonstiges</h2></div>'+
      '<div class="cb">'+
      '<div class="qb"><div class="ql">M\u00f6chten Sie uns sonst noch etwas mitteilen?<span class="req">*</span></div>'+
      '<textarea id="sonstiges" placeholder="Bitte hier antworten" rows="5" maxlength="500" oninput="updateCharCount(this)"></textarea>'+
      '<div class="charcount" id="charcount">0 / 500</div>'+
      '<div class="ferr" id="err_sonstiges">Bitte beantworten Sie diese Frage.</div></div>'+
      navHtml(true,true)+'</div>';
    if(ans.sonstiges){
      var ta=c.querySelector('#sonstiges');
      if(ta){ta.value=ans.sonstiges;updateCharCount(ta);}
    }

  } else {
    c.innerHTML='<div class="ty"><div class="ck">&#10003;</div><h2>Vielen Dank f\u00fcr Ihre Teilnahme!</h2><p>Ihre R\u00fcckmeldungen flie\u00dfen direkt in die Weiterentwicklung der Zusammenarbeit zwischen dem St. Georg Klinikum Eisenach und den MVZ der Eisenach GmbH ein.</p></div>';
  }
  window.scrollTo({top:0,behavior:"smooth"});
}

function updateCharCount(el){
  var n=el.value.length;
  var cc=document.getElementById("charcount");
  if(!cc)return;
  cc.textContent=n+" / 500";
  cc.className="charcount"+(n>=500?" full":n>=400?" near":"");
}

function clearErr(id){var e=document.getElementById(id);if(e)e.classList.remove("on");}

function valIntro(){
  var ok=true;
  var r=document.querySelector('input[name="aw"]:checked');
  if(!r){document.getElementById("err_aw").classList.add("on");ok=false;}
  else{document.getElementById("err_aw").classList.remove("on");ans.aw=r.value;}
  var fbChecked=document.querySelectorAll('input[name="fb"]:checked');
  if(!fbChecked.length){document.getElementById("err_fb").classList.add("on");ok=false;}
  else{document.getElementById("err_fb").classList.remove("on");ans.fb=Array.from(fbChecked).map(function(x){return x.value;}).join(", ");}
  return ok;
}

function valTheme(ti){
  var ok=true;
  var th=PATHS[ans.aw][ti];
  for(var i=0;i<th.qs.length;i++){
    var q=th.qs[i];
    var r=document.querySelector('input[name="'+q.id+'"]:checked');
    if(!r){document.getElementById("err_"+q.id).classList.add("on");ok=false;}
    else{document.getElementById("err_"+q.id).classList.remove("on");ans[q.id]=r.value;}
  }
  var ta=document.getElementById(th.oid);
  if(!ta||!ta.value.trim()){document.getElementById("err_"+th.oid).classList.add("on");ok=false;}
  else{document.getElementById("err_"+th.oid).classList.remove("on");ans[th.oid]=ta.value.trim();}
  return ok;
}

function valSonstiges(){
  var ta=document.getElementById("sonstiges");
  if(!ta||!ta.value.trim()){document.getElementById("err_sonstiges").classList.add("on");return false;}
  document.getElementById("err_sonstiges").classList.remove("on");
  ans.sonstiges=ta.value.trim();
  return true;
}

function nextPage(){
  if(page===0){if(!valIntro())return;page=1;renderPage();}
  else if(page>=1&&page<=3){if(!valTheme(page-1))return;page++;renderPage();}
  else if(page===4){if(!valSonstiges())return;submit();}
}

function prevPage(){if(page>0){page--;renderPage();}}

function submit(){
  var c=document.getElementById("card");
  c.innerHTML='<div class="spin-wrap"><div class="spin"></div><p style="margin-top:14px;color:var(--muted);font-size:14px;">Antworten werden \u00fcbermittelt\u2026</p></div>';
  var payload={
    timestamp: new Date().toISOString(),
    fachbereich: ans.fb || "",
    aw: ans.aw || "",
    sonstiges: ans.sonstiges || ""
  };
  var pathKeys=["mvz_e1","mvz_e2","mvz_e3","mvz_e4","mvz_e5","mvz_e_off","mvz_k1","mvz_k2","mvz_k3","mvz_k4","mvz_k_off","mvz_s1","mvz_s2","mvz_s3","mvz_s_off",
                "kl_e1","kl_e2","kl_e3","kl_e4","kl_e5","kl_e_off","kl_k1","kl_k2","kl_k3","kl_k4","kl_k_off","kl_s1","kl_s2","kl_s3","kl_s_off",
                "b_e1","b_e2","b_e3","b_e4","b_e5","b_e_off","b_k1","b_k2","b_k3","b_k4","b_k_off","b_s1","b_s2","b_s3","b_s_off"];
  for(var i=0;i<pathKeys.length;i++){
    payload[pathKeys[i]] = ans[pathKeys[i]] !== undefined ? ans[pathKeys[i]] : "";
  }
  fetch(WH,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload),mode:"no-cors"})
    .then(function(){page=5;renderPage();})
    .catch(function(){page=5;renderPage();});
}

renderPage();
</script>
</body>
</html>
